name: Bug report
description: Report a reproducible problem in go-unifi-network-list-sync
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps, commands, or API calls.
      placeholder: |
        1. Start container with...
        2. Create job with...
        3. Run sync...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Paste relevant logs, stack traces, or screenshots.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version
      description: App version or image tag (for example, v0.1.0 or main).
      placeholder: v0.1.0
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, container runtime, and architecture.
      placeholder: Ubuntu 24.04, Docker 27.x, linux/amd64
